<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NETRA Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b0f14;
            color: #ffffff;
        }

        .header {
            background: #111827;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2933;
        }

        .header h2 {
            color: #0dcaf0;
            margin: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .logout {
            color: #ff4d4d;
            text-decoration: none;
            font-weight: bold;
        }

        .content {
            padding: 40px;
        }

        .card {
            background: #111827;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(13, 202, 240, 0.15);
        }
    </style>
</head>
<body>

<div class="header">
    <h2>NETRA Dashboard</h2>
    <div class="user-info">
        <img src="{{ user.picture }}" alt="User">
        <span>{{ user.name }}</span>
        <a href="/logout" class="logout">Logout</a>
    </div>
</div>

<div class="content">
    <div class="card">
        <h3>Welcome, {{ user.name }} 👋</h3>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Role:</strong> {{ user.role }}</p>

        <hr>

        <p>This is a secured dashboard.</p>
        <p>Only authenticated users can access this page.</p>
    </div>
</div>

</body>
</html>
